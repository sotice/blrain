<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,350;0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400&family=Homemade+Apple&family=Meera+Inimai&family=Noto+Serif+SC:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link href="../../style.css" rel="stylesheet" type="text/css" media="all" />
    <link rel="apple-touch-icon" sizes="180x180" href="/elements/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/elements/favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/elements/favicon/favicon-16x16.png" />
  </head>
  <body>
    <div class="siteheader">
      <a href="../../" class="siteheader-home">首页</a>
      <nav id="navigation">
        <a href="../../reading/">阅读</a>
        <a href="../../watching/">观影</a>
        <a href="../../listening/">收听</a>
        <a href="../../writing/">写作</a>
        <a href="../../about/">关于</a>
      </nav>
    </div>

    <main>
      <h1>随笔 <a href="../">⤴</a></h1>

      <section>
        <p>用 Markdown 写的随笔，页面自动加载：</p>
      </section>

      <hr />

      <div id="posts"></div>
      <noscript><p>需要启用 JavaScript 才能加载随笔。</p></noscript>

      <p style="text-align: right"><a href="../">← 返回写作</a></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      (async function () {
        const posts = [
          { file: "../posts/example.md", title: "范文：标题" },
        ];

        const container = document.getElementById("posts");
        for (const post of posts) {
          try {
            const res = await fetch(post.file);
            if (!res.ok) continue;
            const md = await res.text();
            const html = marked.parse(md);
            const article = document.createElement("article");
            article.innerHTML = html;
            article.style.marginBottom = "1.5em";
            article.style.paddingBottom = "1em";
            article.style.borderBottom = "1px dashed #6b7a8a9e";
            container.appendChild(article);
          } catch (e) {
            console.warn("Failed to load:", post.file, e);
          }
        }
      })();
    </script>
  </body>
</html>
