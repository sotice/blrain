      <h1>关于</h1>

      <section>
        <article>
          <h2>blrain</h2>
          <p>
            你好，我是
            blrain。这是我的随笔——一个用于记录、存档与创作的地方。我喜欢把想法写下来，把读过的书留住，把值得回味的东西存档。
          </p>
          <p>
            这个网站是一次对个人空间的探索：在喧嚣的互联网里，给自己留一块安静的书桌。没有算法，没有推送，只有文字和它所承载的思考。
          </p>
          <p>
            如果你对我的代码和项目感兴趣，可以在 GitHub 上找到我：<a
              href="https://github.com/sotice"
              target="_blank"
              >github.com/sotice</a
            >。
          </p>
          <p>
            保持好奇，继续阅读，继续写。<nobr
              ><span class="cursive">– blrain</span></nobr
            >
          </p>
        </article>
