    - paragraph [ref=e12]: 值得单独拎出来讲的专辑，每一张都在某种意义上改变了我的听觉。
    - separator [ref=e13]
    - img "For Emma, Forever Ago 封面" [ref=e14]
    - article [ref=e15]:
      - heading "Bon Iver — For Emma, Forever Ago (2007)" [level=3] [ref=e16]
      - paragraph [ref=e17]:
        - generic [ref=e18]: 独立民谣
      - paragraph [ref=e19]: "Justin Vernon 在威斯康星北部森林中的小木屋里独自度过了三个月，用一支话筒和几把破吉他写出了这张专辑。失恋、孤独、冬天——所有的寒冷都被关在门外，变成了音乐里温暖的颗粒感。从《Skinny Love》的嘶哑到《Re: Stacks》的呢喃，这是一张属于深夜和壁炉的专辑。"
    - separator [ref=e20]
    - img "The Blue Notebooks 封面" [ref=e21]
    - article [ref=e22]:
      - heading "Max Richter — The Blue Notebooks (2004)" [level=3] [ref=e23]
      - paragraph [ref=e24]:
        - generic [ref=e25]: 当代古典／极简
      - paragraph [ref=e26]: 《On the Nature of Daylight》大概是21世纪被使用最多次的古典乐曲——出现在《降临》《禁闭岛》《最后生还者》等无数影视作品中，但每一次听到还是会被刺中。Richter 把卡夫卡和茨维塔耶娃的文字朗读叠加在弦乐之上，创造出一种介于阅读和聆听之间的体验。整张专辑像一本在黄昏时分读到的蓝色笔记本，里面的每一页都写着关于暴力和温柔的故事。
    - separator [ref=e27]
    - img "Carrie & Lowell 封面" [ref=e28]
    - article [ref=e29]:
      - heading "Sufjan Stevens — Carrie & Lowell (2015)" [level=3] [ref=e30]
      - paragraph [ref=e31]:
        - generic [ref=e32]: 独立民谣
      - paragraph [ref=e33]: 在母亲 Carrie 和继父 Lowell 去世后，Sufjan 用这张专辑处理了他一生中最复杂的情感——被抛弃的童年、缺席的母爱、以及谅解的可能。《Death with Dignity》的开场像一声叹息，《Fourth of July》里他和母亲的对话让人无法不落泪。这不是一张用来"听"的专辑，是用来经历和愈合的。
    - separator [ref=e34]
    - img "风筝 封面" [ref=e35]
    - article [ref=e36]:
      - heading "孙燕姿 — 风筝 (2001)" [level=3] [ref=e37]
      - paragraph [ref=e38]:
        - generic [ref=e39]: 华语流行
      - paragraph [ref=e40]: 在我心目中这是孙燕姿最好的专辑。从《风筝》的翱翔到《任性》的倔强，从《逃亡》的冒险到《不是真的爱我》的释然——整张专辑就像风筝本身，在天空中划过一道道自由的弧线。她那时还不是后来的"冷门歌手"，只是一个用声音就能让人起鸡皮疙瘩的女孩。
    - separator [ref=e41]
    - img "Bloom 封面" [ref=e42]
    - article [ref=e43]:
      - heading "Beach House — Bloom (2012)" [level=3] [ref=e44]
      - paragraph [ref=e45]:
        - generic [ref=e46]: 梦幻流行／自赏
      - paragraph [ref=e47]: 开场曲《Myth》的前奏一响，你就知道自己要被带走了。Beach House 用他们标志性的 organ 和混响吉他建造了一座属于午后的声音教堂。《Lazuli》是整张专辑的高光时刻——那种层层叠叠的旋律像海浪一样涌上来又退下去。每一首歌都像隔着毛玻璃看到的夏日回忆，模糊、温暖、令人心碎。
    - separator [ref=e48]
    - img "Vespertine 封面" [ref=e49]
    - article [ref=e50]:
      - heading "Björk — Vespertine (2001)" [level=3] [ref=e51]
      - paragraph [ref=e52]:
        - generic [ref=e53]: 电子／艺术流行
      - paragraph [ref=e54]: 冰岛音乐家最具私密感的一张专辑。在《Homogenic》的火山爆发之后，Björk 转身走进了一个由冰雪、心跳和微光构成的世界。微雕般的电子节拍、竖琴和弦乐四重奏、以及那些关于爱情最细腻的耳语——"It's not meant to be a struggle uphill"。这张专辑像一件用冰雕刻的内衣：脆弱、精致、贴着皮肤的温度刚好融化。
    - separator [ref=e55]
    - img "Punisher 封面" [ref=e56]
    - article [ref=e57]:
      - heading "Phoebe Bridgers — Punisher (2020)" [level=3] [ref=e58]
      - paragraph [ref=e59]:
        - generic [ref=e60]: 独立民谣／另类
      - paragraph [ref=e61]: 2020年最让人心碎的专辑之一。Phoebe Bridgers 用她那种半睡半醒的嗓音唱着关于死亡、成名和无法愈合的伤口。"I wanna be emaciated"——她以一种近乎开玩笑的语气说出最真实的自毁倾向。整张专辑像深夜在高速公路上开车，收音机里放着轻快的歌，但你眼泪止不住地往下掉。《I Know the End》最后一分钟的崩溃嘶吼是2020年最准确的年度总结。
    - separator [ref=e62]
    - img "Stranger in the Alps 封面" [ref=e63]
    - article [ref=e64]:
      - heading "Phoebe Bridgers — Stranger in the Alps (2017)" [level=3] [ref=e65]
      - paragraph [ref=e66]:
        - generic [ref=e67]: 独立民谣／另类
      - paragraph [ref=e68]: Phoebe Bridgers 的首张专辑，也是她那个标志性声音的起点——透明、脆弱、带着一丝黑色幽默的绝望。专辑标题来自《老无所依》中杀手在阿尔卑斯山迷路的对话，暗示了整张专辑的基调：一种美丽的迷失感。《Motion Sickness》用轻快的吉他旋律包裹着对一段 toxic 关系的控诉，是2010年代最佳独立摇滚单曲之一。而《Funeral》则是她写给一个已经不在的人的歌——那种安静的悲伤不是嚎啕大哭，而是坐在空房间的地板上发呆。
    - separator [ref=e69]
    - img "folklore 封面" [ref=e70]
    - article [ref=e71]:
      - heading "Taylor Swift — folklore (deluxe version) (2020)" [level=3] [ref=e72]
      - paragraph [ref=e73]:
        - generic [ref=e74]: 独立民谣／另类
      - paragraph [ref=e75]: 在疫情封锁期间，Taylor Swift 和 Aaron Dessner（The National）在远距离合作中做出了可以说，这是她职业生涯中最具突破性的作品。不再是关于前男友的流行金曲，而是关于隐退的作曲家、家族秘密和自然循环的成人故事。《betty》《august》《cardigan》三部曲用三个不同视角讲述了同一个夏天的心碎，这是流行歌手从未尝试过的叙事结构。Taylor 用这张专辑证明了：在安静下来的那一刻，她是这一代最好的创作歌手。
    - separator [ref=e76]
    - img "evermore 封面" [ref=e77]
    - article [ref=e78]:
      - heading "Taylor Swift — evermore (deluxe version) (2020)" [level=3] [ref=e79]
      - paragraph [ref=e80]:
        - generic [ref=e81]: 独立民谣／另类
      - paragraph [ref=e82]: folklore 的胞妹专辑，在 folklore 的森林小屋旁边建了一座更适合过冬的木屋。如果 folklore 是秋天落叶的告别，evermore 就是冬天壁炉边的续篇。《champagne problems》用钢琴讲述了一个关于拒绝求婚的故事，比任何电影都更残忍也更温柔。《tis the damn season》和《dorothea》构成了一对镜像的故事，而《cowboy like me》是整张专辑最被低估的宝石——一首关于两个骗子在舞池里相爱的歌。它不是 folklore，但某种意义上它更好：更温暖、更松弛、更像深夜的开瓶声。
    - separator [ref=e83]
    - img "Cape Forestier 封面" [ref=e84]
    - article [ref=e85]:
      - heading "Angus & Julia Stone — Cape Forestier (2024)" [level=3] [ref=e86]
      - paragraph [ref=e87]:
        - generic [ref=e88]: 独立民谣／流行
      - paragraph [ref=e89]: 澳洲兄妹时隔六年的回归，依然是最擅长制造夏日午后氛围感的组合。专辑以塔斯马尼亚的一个海湾命名，整张专辑也像一次沿着海岸线的公路旅行——阳光、盐味、微风中飘扬的头发。Julia 的嗓音像蜂蜜一样浓稠，Angus 的吉他像低语一样温柔。《Losing You》是那种让人想立刻打电话给某个人的歌，而《The Wedding Song》有着他们标志性的忧郁却温暖的和声。这不是一张要改变世界的专辑，而是一张当你需要被拥抱时可以反复播放的专辑。
    - separator [ref=e90]
    - img "Strange Trails 封面" [ref=e91]
    - article [ref=e92]:
      - heading "Lord Huron — Strange Trails (2015)" [level=3] [ref=e93]
      - paragraph [ref=e94]:
        - generic [ref=e95]: 独立民谣／乡村
      - paragraph [ref=e96]: 一张充满叙事野心的概念专辑，虚构了一个关于无名旅行者、失落的爱和西部荒原的故事。Lord Huron 的音乐像篝火边的传说——混响吉他、空旷的鼓声和 Ben Schneider 那带着回音的嗓音，营造出一种荒野中独行的孤独感。《The Night We Met》是2010年代最催泪的歌曲之一，当它出现在《13 Reasons Why》中时，几乎成了一代人的伤心主题曲。整张专辑像一本泛黄的西部小说，你在深夜读完最后一页，抬头发现窗外的月亮正好是封面上的那一轮。
